<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>睿智商城 RAG Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 3a7 7 0 0 0-7 7v3.2c0 2.8 2.2 5 5 5h4c2.8 0 5-2.2 5-5V10a7 7 0 0 0-7-7Zm-3.2 8.5a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Zm6.4 0a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4ZM9 15h6" />
          </svg>
        </div>
        <div>
          <h1>睿智商城 RAG Demo</h1>
          <p>上传资料、检索知识库、生成带引用的客服回答</p>
        </div>
        <div class="topbar-status" id="storeStatus">Memory Store · no embedding</div>
      </header>

      <main class="workspace">
        <aside class="side-panel">
          <section class="panel">
            <div class="panel-heading">
              <span class="icon-box" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0 4 4m-4-4-4 4M5 16v2.5A1.5 1.5 0 0 0 6.5 20h11a1.5 1.5 0 0 0 1.5-1.5V16" /></svg>
              </span>
              <h2>数据导入</h2>
            </div>
            <label class="file-drop" for="fileInput">
              <input id="fileInput" type="file" accept=".csv,.md,.txt" />
              <span class="file-title">选择 CSV / Markdown / TXT</span>
              <span class="file-subtitle">上传后会真实执行 Load -> Recursive Split -> Memory Store</span>
            </label>
            <div class="status-line" id="uploadStatus">等待上传资料</div>
            <button class="command-button secondary" id="viewDocsButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7c0-1.1 3.6-2 8-2s8 .9 8 2-3.6 2-8 2-8-.9-8-2Zm0 0v5c0 1.1 3.6 2 8 2s8-.9 8-2V7M4 12v5c0 1.1 3.6 2 8 2s8-.9 8-2v-5" /></svg>
              查看知识库
            </button>
          </section>

          <section class="panel">
            <div class="panel-heading danger">
              <span class="icon-box" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M6 7h12m-9 0V5h6v2m-7 3v8m4-8v8m4-8v8M8 7l1 13h6l1-13" /></svg>
              </span>
              <h2>知识库管理</h2>
            </div>
            <button class="command-button danger-button" id="resetButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4v6h6M20 20v-6h-6M5 15a7 7 0 0 0 12.4 3.5M19 9A7 7 0 0 0 6.6 5.5" /></svg>
              重置知识库
            </button>
          </section>

          <section class="panel compact">
            <div class="panel-heading">
              <span class="icon-box" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M5 5h14v11H8l-3 3V5Z" /></svg>
              </span>
              <h2>推荐问题</h2>
            </div>
            <div class="quick-grid" id="suggestions"></div>
          </section>
        </aside>

        <section class="chat-panel" aria-label="聊天区域">
          <div class="chat-header">
            <div>
              <h2>智能客服</h2>
              <p>真实 Load/Split；当前为内存 Store，Embedding/Milvus 尚未接入</p>
            </div>
            <button class="small-button" id="seedDataButton" type="button">载入示例资料</button>
          </div>

          <div class="messages" id="messages">
            <div class="empty-state">
              <div class="empty-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M14 4H6.5A1.5 1.5 0 0 0 5 5.5v13A1.5 1.5 0 0 0 6.5 20h11a1.5 1.5 0 0 0 1.5-1.5V9l-5-5Zm0 0v5h5M8 13h8M8 16h5" /></svg>
              </div>
              <p>先上传商品或售后资料，再向客服提问。</p>
              <span>也可以点击右上角载入示例资料快速体验。</span>
            </div>
          </div>

          <form class="composer" id="chatForm">
            <input id="chatInput" type="text" autocomplete="off" placeholder="例如：推荐一款降噪耳机" />
            <button class="send-button" id="sendButton" type="submit" aria-label="发送">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 12 16-8-5 16-3-7-8-1Zm8 1 8-9" /></svg>
            </button>
          </form>
        </section>
      </main>
    </div>

    <dialog class="modal" id="documentsModal">
      <div class="modal-frame">
        <div class="modal-header">
          <div>
            <h2 id="modalTitle">Knowledge Base</h2>
            <p id="modalSubtitle">0 items</p>
          </div>
          <button class="icon-button" id="closeModalButton" type="button" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" /></svg>
          </button>
        </div>
        <div class="modal-body" id="documentsTable"></div>
        <div class="modal-footer">
          <button class="small-button" id="prevPageButton" type="button">上一页</button>
          <span id="pageInfo">Page 1</span>
          <button class="small-button" id="nextPageButton" type="button">下一页</button>
        </div>
      </div>
    </dialog>

    <script src="/app.js" defer></script>
  </body>
</html>
